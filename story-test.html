<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Story Test</title>

  <!-- Karla font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Karla", sans-serif;
      background: #f5f1e8;
      color: #111;
      overflow-x: hidden;
    }

    /* HERO */

    .hero {
      height: 100svh;
      background: url("assets/story-test/img_01.jpg") center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      padding: 5vw;
      color: white;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      margin: 0;
      max-width: 10ch;
    }

    .hero p {
      margin: 0.5rem 0;
      max-width: 400px;
    }

    /* SCROLLY SECTION */

    .scrolly {
      display: grid;
      grid-template-columns: 1fr;
    }

    .sticky {
      position: sticky;
      top: 0;
      height: 100svh;
      z-index: 1;
    }

    .sticky img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .steps {
      position: relative;
      z-index: 2;
    }

    .step {
      min-height: 90vh;
      display: flex;
      align-items: center;
      padding: 0 5vw;
    }

    .step-inner {
      max-width: 600px;
      font-size: clamp(1.1rem, 2.5vw, 1.3rem);
      line-height: 1.6;
      background: rgba(245, 241, 232, 0.9);
      padding: 20px;
    }

    /* END BLOCK */

    .end {
      padding: 80px 5vw;
      max-width: 700px;
      margin: auto;
      font-size: 1.2rem;
    }

    /* DESKTOP SPLIT */

    @media (min-width: 900px) {
      .scrolly {
        grid-template-columns: 1fr 1fr;
      }

      .sticky {
        grid-column: 2;
      }

      .steps {
        grid-column: 1;
      }

      .step {
        padding: 0 3vw;
      }
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1>Your Title Here</h1>
      <p>Γάτοι στη Μηχανή: A Year of Pangrati's Purring Passengers</p>
      <p>Scroll ↓</p>
    </div>
  </section>

  <!-- SCROLLY -->
  <section class="scrolly">

    <!-- STICKY IMAGE -->
    <div class="sticky">
      <img id="mainImage" src="assets/story-test/img_01.jpg">
    </div>

    <!-- TEXT STEPS -->
    <div class="steps">

      <div class="step" data-img="img_01.jpg">
        <div class="step-inner">
         Ailourofóra Ochímata - Cat-bearing Vehicles
        </div>
      </div>

      <div class="step" data-img="img_01.jpg">
        <div class="step-inner">
          hmmmmmm
        </div>
      </div>

      <div class="step" data-img="img_02.jpg">
        <div class="step-inner">
         This is the cat calendar.
        </div>
      </div>

      <div class="step" data-img="img_02.jpg">
        <div class="step-inner">
         I am now Extending the narrative toward a conclusion.
        </div>
      </div>

    </div>
  </section>

  <!-- END -->
  <section class="end">
    Closing paragraph. Compression, not summary.
  </section>

  <!-- SCRIPT -->
  <script>
    const steps = document.querySelectorAll(".step");
    const img = document.getElementById("mainImage");

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const newImg = entry.target.dataset.img;
          img.src = "assets/story-test/" + newImg;
        }
      });
    }, {
      threshold: 0.6
    });

    steps.forEach(step => observer.observe(step));
  </script>

</body>
</html>
