<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keyword Atlas Prototype</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #000;
      --panel: #050505;
      --panel2: #0a0a0a;
      --border: #1c1c1c;
      --border2: #2b2b2b;
      --text: #f1f1f1;
      --muted: #9a9a9a;
      --muted2: #777;
      --link: #2f2f2f;
      --linkActive: #dadada;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Karla", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 560px 1fr;
      background: var(--bg);
    }

    #panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      min-width: 0;
      min-height: 0;
    }

    .panel-inner {
      padding: 18px 18px 28px;
    }

    .panel-top {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border2);
      background: var(--panel2);
      color: #d8d8d8;
      padding: 9px 12px;
      border-radius: 999px;
      font: inherit;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: border-color .15s, color .15s, background .15s, transform .05s;
    }

    .btn:hover {
      border-color: #595959;
      color: #fff;
      background: #111;
    }

    .btn:active {
      transform: translateY(1px);
    }

    h2 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 700;
      color: #fff;
    }

    .meta {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .doc {
      font-size: 15px;
      line-height: 1.66;
      color: #ececec;
      white-space: pre-wrap;
    }

    .hint {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted2);
      margin-top: 6px;
    }

    mark {
      background: #fff;
      color: #000;
      padding: 0 2px;
      border-radius: 2px;
    }

    #graph-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: var(--bg);
    }

    #graph {
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(circle at center, #0a0a0a 0%, #000 72%);
      touch-action: none;
    }

    #graph-topbar {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      z-index: 20;
    }

    #searchWrap {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 20;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #searchInput {
      width: 280px;
      max-width: 42vw;
      appearance: none;
      border: 1px solid #2b2b2b;
      background: rgba(8, 8, 8, 0.95);
      color: #f2f2f2;
      padding: 11px 14px;
      border-radius: 999px;
      font: inherit;
      font-size: 13px;
      outline: none;
    }

    #searchInput::placeholder {
      color: #7b7b7b;
    }

    #searchInput:focus {
      border-color: #6b6b6b;
    }

    .link {
      stroke: var(--link);
      stroke-opacity: .56;
      transition: stroke .2s, stroke-opacity .2s, stroke-width .2s;
    }

    .link.active {
      stroke: var(--linkActive);
      stroke-opacity: .95;
      stroke-width: 2px;
    }

    .node circle {
      fill: #ffffff;
      stroke: #ffffff;
      stroke-width: 1px;
      cursor: pointer;
      transition: fill .2s, stroke .2s, stroke-width .2s, opacity .2s, r .2s;
    }

    .node text {
      font-size: 12px;
      fill: #bcbcbc;
      pointer-events: none;
      user-select: none;
      transition: fill .2s, opacity .2s;
    }

    .node.dim circle,
    .node.dim text {
      opacity: .12;
    }

    .node.neighbor text,
    .node.active text,
    .node.hovered text {
      fill: #ffffff;
    }

    @media (max-width: 900px) {
      html, body {
        overflow: hidden;
      }

      #app {
        grid-template-columns: 1fr;
        grid-template-rows: 50vh 50vh;
      }

      #graph-wrap {
        order: 1;
        border-bottom: 1px solid var(--border);
      }

      #panel {
        order: 2;
        border-right: none;
        border-top: 1px solid var(--border);
      }

      .panel-inner {
        padding: 16px 16px 24px;
      }

      h2 {
        font-size: 24px;
      }

      #searchInput {
        width: 190px;
        max-width: 52vw;
        font-size: 12px;
        padding: 10px 12px;
      }

      .node text {
        font-size: 11px;
      }
    }

    @media (max-width: 560px) {
      #app {
        grid-template-rows: 48vh 52vh;
      }

      #graph-topbar,
      #searchWrap {
        top: 10px;
      }

      #graph-topbar {
        left: 10px;
      }

      #searchWrap {
        right: 10px;
      }

      .btn {
        padding: 8px 10px;
        font-size: 11px;
      }

      #searchInput {
        width: 150px;
        font-size: 11px;
      }

      h2 {
        font-size: 21px;
      }

      .meta {
        font-size: 11px;
      }

      .doc {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="panel">
      <div class="panel-inner" id="panelContent"></div>
    </aside>

    <div id="graph-wrap">
      <div id="graph-topbar">
        <a class="btn" href="../index.html">Back to Cogito</a>
        <button class="btn" id="resetViewBtn" type="button">Reset view</button>
        <button class="btn" id="clearHistoryBtn" type="button">Clear history</button>
      </div>

      <div id="searchWrap">
        <input id="searchInput" type="text" placeholder="Search documents, keywords, nodes" />
      </div>

      <svg id="graph"></svg>
    </div>
  </div>

  <script>
    const data = {
      nodes: [
        {
          id: "attention",
          group: "concept",
          size: 22,
          keywords: ["attention", "focus", "salience"],
          doc: "Attention is a selective process. It governs which inputs become foregrounded and which remain peripheral. In a digital environment, attention is repeatedly captured by salience cues, interruption loops, and novelty pressure."
        },
        {
          id: "algorithms",
          group: "system",
          size: 20,
          keywords: ["algorithm", "ranking", "optimization"],
          doc: "Algorithms rank, sort, and prioritize content. In platform systems, ranking often follows engagement optimization rather than truth or human flourishing. This produces feedback between user behavior and system output."
        },
        {
          id: "surveillance",
          group: "system",
          size: 18,
          keywords: ["surveillance", "tracking", "metadata"],
          doc: "Surveillance systems collect behavioral traces: clicks, dwell time, location, metadata, and patterns of interaction. These traces are transformed into prediction inputs and commercial intelligence."
        },
        {
          id: "addiction",
          group: "effect",
          size: 16,
          keywords: ["addiction", "compulsion", "dopamine"],
          doc: "Compulsive media use can emerge through intermittent reinforcement, personalized novelty, and emotional volatility. This does not need to be chemically addictive to become behaviorally dominant."
        },
        {
          id: "education",
          group: "domain",
          size: 18,
          keywords: ["education", "learning", "curriculum"],
          doc: "Educational systems increasingly compete with fragmented digital attention. A meaningful knowledge tool should support depth, retrieval, relation, and long-form synthesis rather than fragmentation."
        },
        {
          id: "memory",
          group: "concept",
          size: 17,
          keywords: ["memory", "encoding", "retrieval"],
          doc: "Memory is shaped by repetition, salience, association, and retrieval practice. Connected knowledge graphs can support memory by making conceptual relationships visible and navigable."
        },
        {
          id: "journalism",
          group: "domain",
          size: 15,
          keywords: ["journalism", "investigation", "publics"],
          doc: "Journalism can map opaque systems into intelligible structures. A graph interface can help organize sources, claims, institutions, events, and conceptual frames inside one investigative environment."
        },
        {
          id: "philosophy",
          group: "domain",
          size: 15,
          keywords: ["philosophy", "ethics", "epistemology"],
          doc: "Philosophy helps clarify category errors, causal claims, and normative assumptions. In technological systems, it is useful for distinguishing optimization from value, intelligence from judgment, and signal from meaning."
        },
        {
          id: "neuroscience",
          group: "domain",
          size: 16,
          keywords: ["brain", "neuroscience", "cognition"],
          doc: "Neuroscience contributes models of salience, reward, habit formation, and attentional control. These become relevant when analyzing interface systems designed to repeatedly capture human cognition."
        },
        {
          id: "interface",
          group: "system",
          size: 17,
          keywords: ["interface", "design", "interaction"],
          doc: "Interfaces are not neutral surfaces. They shape behavior through affordances, friction, hierarchy, animation, and pacing. Visual relation maps can make hidden conceptual structure more graspable."
        },
        {
          id: "archive",
          group: "object",
          size: 16,
          keywords: ["archive", "storage", "index"],
          doc: "An archive is not just storage. It is an ordering system. Its usefulness depends on retrieval, relation, visibility, and the ability to recontextualize fragments into larger structures."
        },
        {
          id: "agency",
          group: "effect",
          size: 15,
          keywords: ["agency", "autonomy", "control"],
          doc: "Agency weakens when a subject loses the ability to direct attention, interpret cause, and act deliberately. A good personal system should restore orientation rather than intensify overload."
        }
      ],
      links: [
        { source: "attention", target: "algorithms", weight: 3 },
        { source: "attention", target: "addiction", weight: 3 },
        { source: "attention", target: "memory", weight: 2 },
        { source: "attention", target: "neuroscience", weight: 2 },
        { source: "attention", target: "education", weight: 2 },
        { source: "algorithms", target: "surveillance", weight: 3 },
        { source: "algorithms", target: "interface", weight: 2 },
        { source: "algorithms", target: "addiction", weight: 2 },
        { source: "algorithms", target: "journalism", weight: 1 },
        { source: "surveillance", target: "journalism", weight: 2 },
        { source: "surveillance", target: "philosophy", weight: 1 },
        { source: "surveillance", target: "agency", weight: 2 },
        { source: "education", target: "memory", weight: 2 },
        { source: "education", target: "archive", weight: 2 },
        { source: "education", target: "interface", weight: 1 },
        { source: "journalism", target: "archive", weight: 2 },
        { source: "journalism", target: "philosophy", weight: 1 },
        { source: "philosophy", target: "agency", weight: 2 },
        { source: "neuroscience", target: "addiction", weight: 2 },
        { source: "neuroscience", target: "memory", weight: 2 },
        { source: "interface", target: "agency", weight: 1 },
        { source: "archive", target: "memory", weight: 1 }
      ]
    };

    const HISTORY_KEY = "keyword-atlas-black-history-v1";
    let visitedMap = loadVisitedMap();
    let activeNodeId = null;
    let hoverNodeId = null;
    let currentSearch = "";

    const panelContent = document.getElementById("panelContent");
    const graphWrap = document.getElementById("graph-wrap");
    const svg = d3.select("#graph");
    const searchInput = document.getElementById("searchInput");

    const zoomLayer = svg.append("g");
    const linkLayer = zoomLayer.append("g");
    const nodeLayer = zoomLayer.append("g");

    const adjacency = new Map();
    data.nodes.forEach(n => adjacency.set(n.id, new Set()));
    data.links.forEach(l => {
      adjacency.get(l.source).add(l.target);
      adjacency.get(l.target).add(l.source);
    });

    function getGraphSize() {
      const rect = graphWrap.getBoundingClientRect();
      return {
        width: Math.max(320, rect.width),
        height: Math.max(320, rect.height)
      };
    }

    let { width, height } = getGraphSize();
    svg.attr("viewBox", `0 0 ${width} ${height}`);

    const zoomBehavior = d3.zoom()
      .scaleExtent([0.35, 3])
      .on("zoom", (event) => {
        zoomLayer.attr("transform", event.transform);
      });

    svg.call(zoomBehavior);

    const simulation = d3.forceSimulation(data.nodes)
      .force("link", d3.forceLink(data.links).id(d => d.id).distance(d => 124 - d.weight * 12).strength(0.18))
      .force("charge", d3.forceManyBody().strength(-225))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collide", d3.forceCollide().radius(d => d.size + 20))
      .force("x", d3.forceX(width / 2).strength(0.015))
      .force("y", d3.forceY(height / 2).strength(0.015));

    const link = linkLayer
      .selectAll("line")
      .data(data.links)
      .enter()
      .append("line")
      .attr("class", "link")
      .attr("stroke-width", d => 0.8 + d.weight * 0.35);

    const node = nodeLayer
      .selectAll("g")
      .data(data.nodes)
      .enter()
      .append("g")
      .attr("class", "node")
      .call(drag(simulation));

    node.append("circle")
      .attr("r", d => d.size);

    node.append("text")
      .attr("dx", d => d.size + 8)
      .attr("dy", 4)
      .text(d => d.id);

    node
      .on("mouseover", function(event, d) {
        hoverNodeId = d.id;
        renderPanel(d);
        updateStyles();
      })
      .on("mouseout", function() {
        hoverNodeId = null;
        if (activeNodeId) {
          renderPanel(findNode(activeNodeId));
        } else {
          renderDefaultPanel();
        }
        updateStyles();
      })
      .on("click", function(event, d) {
        markVisited(d.id);
        activeNodeId = activeNodeId === d.id ? null : d.id;
        applyActiveForces();
        if (activeNodeId) {
          centerOnNode(d);
          renderPanel(d);
        } else {
          renderDefaultPanel();
        }
        updateStyles();
      })
      .on("touchstart", function(event, d) {
        event.preventDefault();
        markVisited(d.id);
        activeNodeId = d.id;
        hoverNodeId = d.id;
        applyActiveForces();
        centerOnNode(d);
        renderPanel(d);
        updateStyles();
      });

    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

      node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    document.getElementById("resetViewBtn").addEventListener("click", () => {
      svg.transition().duration(350).call(zoomBehavior.transform, d3.zoomIdentity);
    });

    document.getElementById("clearHistoryBtn").addEventListener("click", () => {
      visitedMap = {};
      localStorage.removeItem(HISTORY_KEY);
      updateStyles();
      if (activeNodeId) renderPanel(findNode(activeNodeId));
      else renderDefaultPanel();
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runSearch(searchInput.value);
    });

    searchInput.addEventListener("input", (e) => {
      currentSearch = e.target.value.trim();
      if (!currentSearch) {
        if (activeNodeId) renderPanel(findNode(activeNodeId));
        else renderDefaultPanel();
      }
    });

    function loadVisitedMap() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveVisitedMap() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(visitedMap));
    }

    function markVisited(nodeId) {
      if (!visitedMap[nodeId]) {
        visitedMap[nodeId] = true;
        saveVisitedMap();
      }
    }

    function findNode(id) {
      return data.nodes.find(n => n.id === id);
    }

    function isVisited(id) {
      return !!visitedMap[id];
    }

    function normalize(text) {
      return text.toLowerCase().trim();
    }

    function scoreNode(nodeData, query) {
      const q = normalize(query);
      if (!q) return -1;

      let score = 0;
      const id = normalize(nodeData.id);
      const keywords = nodeData.keywords.map(normalize);
      const doc = normalize(nodeData.doc);

      if (id === q) score += 100;
      if (id.includes(q)) score += 40;

      keywords.forEach(k => {
        if (k === q) score += 50;
        else if (k.includes(q)) score += 20;
      });

      if (doc.includes(q)) score += 15;

      const words = q.split(/\s+/).filter(Boolean);
      words.forEach(word => {
        if (id.includes(word)) score += 10;
        keywords.forEach(k => {
          if (k.includes(word)) score += 8;
        });
        if (doc.includes(word)) score += 4;
      });

      return score;
    }

    function runSearch(query) {
      const q = query.trim();
      currentSearch = q;
      if (!q) return;

      let bestNode = null;
      let bestScore = -1;

      data.nodes.forEach(n => {
        const s = scoreNode(n, q);
        if (s > bestScore) {
          bestScore = s;
          bestNode = n;
        }
      });

      if (!bestNode || bestScore <= 0) {
        panelContent.innerHTML = `
          <div class="panel-top">
            <a class="btn" href="../index.html">Back to Cogito</a>
          </div>
          <h2>No result</h2>
          <div class="meta">Search: ${escapeHtml(q)}</div>
          <div class="doc hint">No node matched strongly enough. Try a keyword, node title, or a phrase from a document.</div>
        `;
        return;
      }

      markVisited(bestNode.id);
      activeNodeId = bestNode.id;
      hoverNodeId = null;
      applyActiveForces();
      renderPanel(bestNode);
      updateStyles();
      centerOnNode(bestNode);
    }

    function applyActiveForces() {
      if (!activeNodeId) {
        simulation.force("clusterX", null);
        simulation.force("clusterY", null);
        simulation.alpha(0.9).restart();
        return;
      }

      const active = findNode(activeNodeId);
      const neighbors = adjacency.get(activeNodeId);

      simulation.force("clusterX", d3.forceX(d => {
        if (d.id === activeNodeId) return active.x || width / 2;
        if (neighbors.has(d.id)) return active.x || width / 2;
        return width / 2;
      }).strength(d => {
        if (d.id === activeNodeId) return 0.45;
        if (neighbors.has(d.id)) return 0.18;
        return 0.01;
      }));

      simulation.force("clusterY", d3.forceY(d => {
        if (d.id === activeNodeId) return active.y || height / 2;
        if (neighbors.has(d.id)) return active.y || height / 2;
        return height / 2;
      }).strength(d => {
        if (d.id === activeNodeId) return 0.45;
        if (neighbors.has(d.id)) return 0.18;
        return 0.01;
      }));

      simulation.alpha(1).restart();
    }

    function getNodeStyle(d, focusId) {
      const focused = focusId === d.id;
      const neighbor = focusId ? adjacency.get(focusId).has(d.id) : false;
      const visited = isVisited(d.id);

      let fill = "#ffffff";
      let stroke = "#ffffff";
      let strokeWidth = 1;

      if (visited) {
        fill = "#000000";
        stroke = "#ffffff";
        strokeWidth = 1.6;
      }

      if (focused) {
        fill = "#000000";
        stroke = "#ffffff";
        strokeWidth = 2.2;
      } else if (neighbor) {
        fill = visited ? "#101010" : "#d8d8d8";
        stroke = "#ffffff";
        strokeWidth = 1.4;
      }

      return { fill, stroke, strokeWidth, focused, neighbor };
    }

    function updateStyles() {
      const focusId = hoverNodeId || activeNodeId;

      node.each(function(d) {
        const el = d3.select(this);
        const style = getNodeStyle(d, focusId);
        const isFocused = style.focused;
        const isNeighbor = style.neighbor;

        el.classed("active", activeNodeId === d.id);
        el.classed("hovered", hoverNodeId === d.id);
        el.classed("neighbor", isNeighbor);
        el.classed("dim", !!focusId && !(isFocused || isNeighbor));

        el.select("circle")
          .attr("fill", style.fill)
          .attr("stroke", style.stroke)
          .attr("stroke-width", style.strokeWidth);
      });

      link
        .classed("active", d => {
          if (!focusId) return false;
          const a = d.source.id || d.source;
          const b = d.target.id || d.target;
          return a === focusId || b === focusId;
        })
        .attr("stroke-opacity", d => {
          if (!focusId) return 0.56;
          const a = d.source.id || d.source;
          const b = d.target.id || d.target;
          return (a === focusId || b === focusId) ? 0.95 : 0.07;
        });
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function highlightTerms(text, terms) {
      let result = escapeHtml(text);
      const safeTerms = [...new Set(terms.filter(Boolean))].sort((a, b) => b.length - a.length);

      safeTerms.forEach(term => {
        const regex = new RegExp(`\\b(${escapeRegExp(term)})\\b`, "gi");
        result = result.replace(regex, "<mark>$1</mark>");
      });

      if (currentSearch) {
        currentSearch.split(/\s+/).filter(Boolean).forEach(term => {
          const regex = new RegExp(`(${escapeRegExp(term)})`, "gi");
          result = result.replace(regex, "<mark>$1</mark>");
        });
      }

      return result;
    }

    function renderDefaultPanel() {
      panelContent.innerHTML = `
        <div class="panel-top">
          <a class="btn" href="../index.html">Back to Cogito</a>
        </div>
        <h2>Keyword Atlas</h2>
        <div class="meta">White nodes by default. Click a node to turn it black and persist it as visited. Use the search bar to jump to a matching document.</div>
        <div class="doc hint">
          Hover or tap to preview.<br><br>
          Click to select and pull related nodes inward.<br><br>
          Search checks node names, keywords, and full document text.
        </div>
      `;
    }

    function renderPanel(nodeData) {
      const connected = [...adjacency.get(nodeData.id)];
      const highlighted = highlightTerms(nodeData.doc, nodeData.keywords);
      const visited = isVisited(nodeData.id);
      const selected = activeNodeId === nodeData.id;

      panelContent.innerHTML = `
        <div class="panel-top">
          <a class="btn" href="../index.html">Back to Cogito</a>
        </div>
        <h2>${escapeHtml(nodeData.id)}</h2>
        <div class="meta">
          group: ${escapeHtml(nodeData.group)} · keywords: ${nodeData.keywords.map(escapeHtml).join(", ")}<br>
          connected nodes: ${connected.length}${selected ? " · selected" : ""}${visited ? " · visited" : ""}${currentSearch ? " · search active" : ""}
        </div>
        <div class="doc">${highlighted}</div>
      `;
    }

    function centerOnNode(d) {
      const current = d3.zoomTransform(svg.node());
      const scale = current.k;
      const targetX = width / 2 - d.x * scale;
      const targetY = height / 2 - d.y * scale;

      svg.transition()
        .duration(450)
        .call(
          zoomBehavior.transform,
          d3.zoomIdentity.translate(targetX, targetY).scale(scale)
        );
    }

    function drag(sim) {
      function dragstarted(event, d) {
        if (!event.active) sim.alphaTarget(0.25).restart();
        d.fx = d.x;
        d.fy = d.y;
      }

      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragended(event, d) {
        if (!event.active) sim.alphaTarget(0);
      }

      return d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended);
    }

    function resizeGraph() {
      const size = getGraphSize();
      width = size.width;
      height = size.height;
      svg.attr("viewBox", `0 0 ${width} ${height}`);

      simulation.force("center", d3.forceCenter(width / 2, height / 2));
      simulation.force("x", d3.forceX(width / 2).strength(0.015));
      simulation.force("y", d3.forceY(height / 2).strength(0.015));

      if (activeNodeId) applyActiveForces();
      simulation.alpha(0.6).restart();
    }

    window.addEventListener("resize", resizeGraph);

    renderDefaultPanel();
    updateStyles();
    simulation.alpha(1).restart();
  </script>
</body>
</html>
