<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Keyword Atlas Prototype</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #000;
      --panel: #050505;
      --panel2: #0a0a0a;
      --border: #1c1c1c;
      --border2: #2b2b2b;
      --text: #f1f1f1;
      --muted: #9a9a9a;
      --muted2: #777;
      --link: #2f2f2f;
      --linkActive: #dadada;
      --mobile-top: 58px;
      --split: 50;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Karla", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 560px 1fr;
      background: var(--bg);
    }

    #panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      min-width: 0;
      min-height: 0;
    }

    .panel-inner {
      padding: 18px 18px 28px;
    }

    .panel-top {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border2);
      background: var(--panel2);
      color: #d8d8d8;
      padding: 9px 12px;
      border-radius: 999px;
      font: inherit;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: border-color .15s, color .15s, background .15s, transform .05s;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: #595959;
      color: #fff;
      background: #111;
    }

    .btn:active {
      transform: translateY(1px);
    }

    h2 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 700;
      color: #fff;
    }

    .meta {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .doc {
      font-size: 15px;
      line-height: 1.66;
      color: #ececec;
      white-space: pre-wrap;
    }

      font-size: 13px;
      line-height: 1.6;
      color
